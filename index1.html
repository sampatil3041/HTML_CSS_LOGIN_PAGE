<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page </title>
    <script src="https://kit.fontawesome.com/d5b7980e90.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    

</head>
<body>
    <div class="container">
        <form action="">
            <h1>Login</h1>
            <div class="input">
                <span><i class="fa-solid fa-circle-user"></i></span>
                <input type="text" class="fillup" name="username" placeholder="Username" required>
                
            </div>
            <div class="input">
                <span><i class="fa-solid fa-lock"></i></span>
                <input type="password" class="fillup" name="password" placeholder="Password" required>
                
            </div>

            <div class="remember-forget">
                <label for="remember"><input type="checkbox" id="remember">Remember me</label>
                <a href="#" target="_blank">Forgot Password?</a>
            </div>

            <div class="submit">
                <input type="submit">
            </div>
            
            <div class="register">
                <p>Don't have an account?
                    <a href="#">Register</a>
                </p>
            </div>

        </form>
    </div>
</body>

</html>
